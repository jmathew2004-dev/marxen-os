name: Build and Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: marxen_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json
    
    - name: Install dependencies
      working-directory: ./backend
      run: npm ci
    
    - name: Check syntax
      working-directory: ./backend
      run: node -c server.js && find src -name "*.js" -exec node -c {} \;
    
    - name: Run database migrations
      working-directory: ./backend
      env:
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/marxen_test
        DB_HOST: localhost
        DB_USER: postgres
        DB_PASSWORD: postgres
        DB_NAME: marxen_test
      run: npm run migrate
    
    - name: Verify API endpoints
      working-directory: ./backend
      env:
        NODE_ENV: test
        DATABASE_URL: postgresql://postgres:postgres@localhost:5432/marxen_test
      run: npm start &
    
    - name: Check API health
      run: |
        sleep 5
        curl -f http://localhost:5000/health || exit 1

  frontend:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install dependencies
      working-directory: ./frontend
      run: npm ci
    
    - name: Build
      working-directory: ./frontend
      run: npm run build
    
    - name: Verify dist folder
      working-directory: ./frontend
      run: |
        if [ ! -d dist ] || [ -z "$(ls -A dist)" ]; then
          echo "ERROR: dist folder is empty or doesn't exist"
          exit 1
        fi
        echo "✓ Frontend build successful"

  docker:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Build Docker images
      run: docker-compose build
    
    - name: Test Docker containers startup
      run: |
        docker-compose up -d postgres
        sleep 10
        docker-compose exec -T postgres pg_isready -U postgres || exit 1
        echo "✓ Docker containers are healthy"
    
    - name: Cleanup
      run: docker-compose down
